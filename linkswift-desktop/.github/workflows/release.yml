name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      release_upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.VERSION_STRIPPED }}
      version_tag: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_STRIPPED=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: LinkSwift Desktop ${{ steps.version.outputs.VERSION }}
          draft: true
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    name: Build ${{ matrix.platform.label }}
    needs: create-release
    runs-on: ${{ matrix.platform.runner }}
    defaults:
      run:
        working-directory: linkswift-desktop
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04, label: Linux-x64, bundle: 'deb,appimage' }
          - { runner: windows-2022, label: Windows-x64, bundle: 'msi,nsis' }
          - { runner: macos-14, label: macOS-x64, bundle: 'app,dmg', target: '' }
          - { runner: macos-14, label: macOS-ARM64, bundle: 'app,dmg', target: 'aarch64-apple-darwin' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: linkswift-desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            linkswift-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('linkswift-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ needs.create-release.outputs.version_tag }}
          releaseName: LinkSwift Desktop ${{ needs.create-release.outputs.version_tag }}
          releaseBody: |
            ## LinkSwift Desktop ${{ needs.create-release.outputs.version_tag }}

            ### 安装包下载
            - **Windows**: 下载 `.msi` 或 `.exe` (NSIS) 安装包
            - **Linux**: 下载 `.deb` (Debian/Ubuntu) 或 `.AppImage` (通用) 安装包
            - **macOS**: 下载 `.dmg` 安装包
          releaseDraft: true
          prerelease: false
          bundleName: LinkSwift-Desktop
          bundleVersion: ${{ needs.create-release.outputs.version }}
          bundleFormats: ${{ matrix.platform.bundle }}
          args: ${{ matrix.platform.target && format('--target {0}', matrix.platform.target) || '' }}

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version_tag }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
